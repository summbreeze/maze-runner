<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Maze Runner</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>
    <body>
        <button class="btn-lang" id="btn-lang">中文</button>
        <h1>MAZE RUNNER</h1>
        <p class="subtitle" data-i18n="subtitle">Generate, Solve, and Explore</p>

        <div class="controls-row">
            <label data-i18n="size">Size</label>
            <input type="number" id="inp-w" value="15" min="5" max="50" />
            <span class="x">&times;</span>
            <input type="number" id="inp-h" value="15" min="5" max="50" />
            <div class="sep"></div>
            <label data-i18n="generator">Generator</label>
            <select id="sel-algo">
                <option value="dfs" data-i18n="gen_dfs">DFS (Recursive Backtracker)</option>
                <option value="wilson" data-i18n="gen_wilson">Wilson (Uniform Spanning Tree)</option>
                <option value="division" data-i18n="gen_division">Recursive Division (Top-Down)</option>
            </select>
            <button class="btn btn-primary" id="btn-gen" data-i18n="generate">Generate</button>
            <label class="toggle-label">
                <input type="checkbox" id="chk-animate" />
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span data-i18n="animate">Animate</span>
            </label>
            <label class="speed-label">
                <input type="range" id="rng-speed" min="1" max="100" value="10" />
                <span id="speed-val">10x</span>
            </label>
            <div class="sep"></div>
            <label class="toggle-label">
                <input type="checkbox" id="chk-heatmap" />
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span data-i18n="heatmap">Heatmap</span>
            </label>
        </div>

        <div class="controls-row">
            <label data-i18n="solver">Solver</label>
            <select id="sel-solver">
                <option value="random" data-i18n="sol_random">Random Walk</option>
                <option value="smart" data-i18n="sol_smart">Smart Random</option>
                <option value="smartdfs" data-i18n="sol_smartdfs">Junction Walker</option>
                <option value="dfs" data-i18n="sol_dfs">DFS</option>
                <option value="bfs" data-i18n="sol_bfs">BFS (Shortest Path)</option>
                <option value="righthand" data-i18n="sol_righthand">Right-Hand Rule</option>
            </select>
            <button class="btn btn-secondary" id="btn-solve" data-i18n="solve">Solve</button>
            <button class="btn btn-danger" id="btn-stop" style="display: none" data-i18n="stop">Stop</button>
            <div class="sep"></div>
            <label class="toggle-label">
                <input type="checkbox" id="chk-trail" checked />
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                <span data-i18n="trail">Trail</span>
            </label>
        </div>

        <div class="stats">
            <span><i class="dot dot-player"></i> <span data-i18n="player">Player</span></span>
            <span><i class="dot dot-exit"></i> <span data-i18n="exit">Exit</span></span>
            <span><i class="dot dot-trail"></i> <span data-i18n="trail">Trail</span></span>
            <span><i class="dot dot-gen"></i> <span data-i18n="generator">Generator</span></span>
            <span id="steps-display">Steps: 0</span>
            <span id="time-display">Time: 0s</span>
            <span id="cells-display">Cells: 1/225</span>
            <span id="origin-display">Origin: 0</span>
            <span id="dist-display">Dist: -</span>
            <span id="diff-display">Difficulty: -</span>
        </div>

        <div class="maze-wrapper">
            <canvas id="maze-canvas"></canvas>
        </div>

        <p class="hint" data-i18n="hint">Use arrow keys or WASD to move</p>

        <!-- Mobile D-Pad -->
        <div class="dpad">
            <div class="dpad-row">
                <button class="btn-dir spacer"></button>
                <button class="btn-dir" data-dir="up">&#9650;</button>
                <button class="btn-dir spacer"></button>
            </div>
            <div class="dpad-row">
                <button class="btn-dir" data-dir="left">&#9664;</button>
                <button class="btn-dir" data-dir="down">&#9660;</button>
                <button class="btn-dir" data-dir="right">&#9654;</button>
            </div>
        </div>

        <footer data-i18n="footer">Created by summbreeze</footer>

        <!-- Win Overlay -->
        <div class="overlay" id="overlay">
            <div class="win-card">
                <h2 data-i18n="congrats">Congratulations!</h2>
                <p id="win-msg" data-i18n="win_msg">You escaped the maze!</p>
                <p id="win-stats" style="color: #888; font-size: 0.85rem; margin-bottom: 16px"></p>
                <canvas id="chart-canvas" width="480" height="180"
                    style="display: block; margin: 0 auto 20px; border-radius: 8px; background: #12121f;"></canvas>
                <div style="display: flex; gap: 12px; justify-content: center">
                    <button class="btn btn-primary" id="btn-again" data-i18n="play_again">Play Again</button>
                    <button class="btn btn-secondary" id="btn-newgame" data-i18n="new_game">New Game</button>
                </div>
            </div>
        </div>

        <script src="js/main.js"></script>
    </body>
</html>
